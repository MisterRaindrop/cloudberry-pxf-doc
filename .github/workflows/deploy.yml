name: Deploy Documentation

on:
  push:
    branches: [main]
  schedule:
    # Every Monday at 00:00 UTC — sync upstream and rebuild
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout upstream PXF repo
        uses: actions/checkout@v4
        with:
          repository: apache/cloudberry-pxf
          path: upstream-pxf
          sparse-checkout: |
            README.md
            CONTRIBUTING.md
            TROUBLESHOOTING.md
            ROADMAP.md

      - name: Run sync script
        run: bash scripts/sync-from-upstream.sh upstream-pxf

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit sync changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync upstream developer docs $(date +%Y-%m-%d)"
          git push

  build-deploy:
    runs-on: ubuntu-latest
    needs: [sync-upstream]
    if: always() && (needs.sync-upstream.result == 'success' || needs.sync-upstream.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
